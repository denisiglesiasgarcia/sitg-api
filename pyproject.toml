[project]
name = "sitg-api"
version = "0.1.0"
description = "Client générique pour les APIs ArcGIS REST SITG"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "geopandas>=1.1.3",
    "ipykernel>=7.2.0",
    "ipywidgets>=8.1.8",
    "matplotlib>=3.10.9",
    "polars>=1.40.1",
    "requests>=2.33.1",
    "ruff>=0.15.12",
    "shapely>=2.1.2",
    "tqdm>=4.67.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
 
[tool.hatch.build.targets.wheel]
packages = ["src/sitg_api"]

[tool.uv]
link-mode = "copy"
