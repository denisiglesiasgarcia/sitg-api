name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Lint & format ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push autofix commits back to the branch

    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the actual branch so we can push back fixes.
          # On pull_request events from forks this will be read-only — that's fine,
          # the step is skipped gracefully by git-auto-commit-action.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --all-groups

      - name: Fix formatting (ruff format)
        run: uv run ruff format src/ tests/

      - name: Fix linting (ruff check --fix)
        run: uv run ruff check --fix src/ tests/

      - name: Commit autofixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "style: auto-fix ruff formatting and linting [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # Final hard check — fails the job if ruff still reports issues
      # after autofixes (e.g. errors that cannot be auto-corrected).
      - name: Check (ruff format --check)
        run: uv run ruff format --check src/ tests/

      - name: Check (ruff check)
        run: uv run ruff check src/ tests/

  # ── 2. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # Run tests even if lint job auto-committed a fix — tests run against the
    # committed state of the branch, which is always clean at this point.
    needs: lint

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
